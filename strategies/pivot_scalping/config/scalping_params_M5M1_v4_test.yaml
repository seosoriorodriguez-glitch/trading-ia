# ============================================================
# ESTRATEGIA V4 - PREV-DAY H/L + MARKET STRUCTURE
# ============================================================
# Zonas: High y Low del dia anterior (2 zonas/dia, objetivas).
# Direccion: estructura de mercado (HH+HL=long, LH+LL=short).
# Entrada: misma logica V3 (pin bar / engulfing en M1).
#
# Sin look-ahead bias: zonas del dia D se calculan con datos D-1.
# La estructura usa solo swings confirmados hasta el momento.
#
# Version: 4.0 (Experimental)
# Fecha: 27 Mar 2026
# ============================================================

pivots:
  # Swing strength para estructura de mercado (no para zonas)
  structure_swing_strength: 10
  zone_buffer: 20

  # Estos parametros no se usan en V4 (zonas son prev-day H/L)
  # pero los heredamos para no romper el constructor base
  swing_strength: 7
  zone_type: "full_candle"
  min_touches: 1
  min_touch_separation: 2
  max_touches: 10
  expiry_candles: 200
  max_active_zones: 2

entry:
  valid_patterns:
    - 'pin_bar'
    - 'engulfing'

  pin_bar:
    min_wick_to_body_ratio: 2.0
    max_body_pct: 0.35

  engulfing:
    min_body_ratio: 1.0

stop_loss:
  buffer_points: 20
  min_risk_points: 20
  structure_buffer: 5
  swing_lookback: 10

take_profit:
  method: "structure"
  structure:
    offset_points: 3
  fallback_rr: 1.5
  min_rr_ratio: 1.2

break_even:
  enabled: false

trailing_stop:
  enabled: false

filters:
  time:
    enabled: true
    sessions:
      london:
        start: "08:00"
        end: "11:00"
        skip_first_minutes: 15
      new_york:
        start: "13:30"
        end: "19:30"
        skip_first_minutes: 15
    allowed_days: [1, 2, 3, 4, 5]

  spread:
    enabled: true
    max_spread_points: 5

  trend:
    enabled: false

sizing:
  risk_per_trade_pct: 0.005
  max_simultaneous_trades: 2
  max_total_risk_pct: 0.01

costs:
  avg_spread_points: 2
  commission_per_lot: 0

ftmo:
  max_daily_drawdown_pct: 0.04
  max_total_drawdown_pct: 0.08
  close_before_weekend: true
  weekend_close_hour: 21
