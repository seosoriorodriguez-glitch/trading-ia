# ============================================================
# ESTRATEGIA: PIVOT POINTS SCALPING M5/M1 - BUFFER 10
# ============================================================
# TEST: Buffer 10 puntos para reducir rechazos del broker
# ============================================================

pivots:
  swing_strength: 2
  zone_type: "full_candle"
  min_touches: 1
  min_touch_separation: 2
  max_touches: 10
  expiry_candles: 200
  max_active_zones: 12
  min_zone_width: 3
  max_zone_width: 150

entry:
  valid_patterns:
    - 'pin_bar'
    - 'engulfing'
  
  pin_bar:
    min_wick_to_body_ratio: 2.0
    max_body_pct: 0.35
  
  engulfing:
    min_body_ratio: 1.0

stop_loss:
  buffer_points: 10                 # TEST: 10 pts (vs 5 actual)
  min_risk_points: 8                # Ajustado proporcionalmente

take_profit:
  method: "structure"
  structure:
    offset_points: 3
  fallback_rr: 1.5
  min_rr_ratio: 1.2

break_even:
  enabled: false
  trigger_rr: 1.0
  offset_points: 3

trailing_stop:
  enabled: false
  method: "candle_structure"
  activation_rr: 1.0
  candle_structure:
    update_on_new_candle: true
  fixed_points:
    trail_distance: 15

filters:
  time:
    enabled: true
    sessions:
      london:
        start: "08:00"
        end: "11:00"
        skip_first_minutes: 15
      new_york:
        start: "13:30"
        end: "19:30"
        skip_first_minutes: 15
    allowed_days: [1, 2, 3, 4, 5]
  
  spread:
    enabled: true
    max_spread_points: 5
  
  trend:
    enabled: false

sizing:
  risk_per_trade_pct: 0.005
  max_simultaneous_trades: 2
  max_total_risk_pct: 0.01

costs:
  avg_spread_points: 2
  commission_per_lot: 0

ftmo:
  max_daily_drawdown_pct: 0.04
  max_total_drawdown_pct: 0.08
  close_before_weekend: true
  weekend_close_hour: 21
